name: Build GIMX for Armbian arm64

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DEB_NAME: gimx-arm64-bookworm
  BUILD_DIR: /workspace

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - container: "arm64v8/debian:bookworm"
            platform: "linux/arm64"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build inside Debian Bookworm arm64 container
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:${{ env.BUILD_DIR }} \
            -w ${{ env.BUILD_DIR }} \
            ${{ matrix.container }} \
            bash -c '
              set -e

              # 更新并安装编译依赖
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                git \
                pkg-config \
                libwxgtk3.0-gtk3-dev \
                libbluetooth-dev \
                libxml2-dev \
                libusb-1.0-0-dev \
                libncurses-dev \
                gettext \
                libmhash-dev \
                libcurl4-gnutls-dev \
                libxi-dev \
                libx11-dev \
                libgudev-1.0-dev \
                libavahi-client-dev \
                libffi-dev \
                libxcb1-dev \
                libxcb-util0-dev \
                ca-certificates

              # 编译与安装到临时目录
              make -j$(nproc) PREFIX=/usr
              make install PREFIX=/usr DESTDIR=${{ env.BUILD_DIR }}/install
            '

      - name: Create DEB package
        run: |
          INSTALL_DIR="${{ github.workspace }}/install"
          DEB_DIR="${{ github.workspace }}/deb-package"
          
          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/usr"
          
          # 拷贝安装的文件
          cp -r "${INSTALL_DIR}/usr/"* "${DEB_DIR}/usr/"
          
          # 创建 DEB 控制文件
          cat > "${DEB_DIR}/DEBIAN/control" << EOF
          Package: gimx
          Version: 8.0.0-armbian-bookworm-arm64
          Section: utils
          Priority: optional
          Architecture: arm64
          Depends: libwxgtk3.0-gtk3-0v5, libbluetooth3, libxml2, libusb-1.0-0, libncursesw6, libmhash2, libcurl3-gnutls, libxi6, libx11-6, libgudev-1.0-0, libavahi-client3, libffi8
          Maintainer: GitHub Actions Build
          Description: Game Input MultipleXer for Armbian (Debian Bookworm arm64)
           GIMX allows using a computer as a hub for gaming devices.
           This package is built specifically for Armbian Bookworm Server arm64.
          EOF
          
          # 构建 DEB 包
          dpkg-deb --build "${DEB_DIR}" "${{ env.DEB_NAME }}.deb"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEB_NAME }}
          path: ${{ env.DEB_NAME }}.deb
