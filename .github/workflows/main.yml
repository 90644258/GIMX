name: Build GIMX for Armbian Bookworm (arm64)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEB_NAME: gimx-8.0-bookworm-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build inside arm64 Debian Bookworm container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/debian:bookworm \
            bash -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential git pkg-config \
                libwxgtk3.2-dev \
                libbluetooth-dev \
                libxml2-dev \
                libusb-1.0-0-dev \
                libncurses-dev \
                gettext \
                libmhash-dev \
                libcurl4-gnutls-dev \
                libxi-dev \
                libx11-dev \
                libgudev-1.0-dev \
                libavahi-client-dev \
                libffi-dev \
                libxcb1-dev \
                libxcb-util0-dev
              make -j$(nproc)
              make install DESTDIR=/workspace/install
            '

      - name: Package as .deb
        run: |
          mkdir -p deb/DEBIAN
          cp -r install/usr deb/
          cat > deb/DEBIAN/control << 'EOF'
          Package: gimx
          Version: 8.0-1
          Architecture: arm64
          Maintainer: GIMX Community
          Description: Game Input MultipleXer for Armbian Bookworm
           GIMX lets you use a computer as a hub for gaming devices
           and control consoles (PlayStation, Xbox) via USB or Bluetooth.
          Depends: libc6, libbluetooth3, libusb-1.0-0, libncursesw6, libcurl3-gnutls, libx11-6, libavahi-client3, libffi8
          Priority: optional
          EOF
          dpkg-deb --build deb ${DEB_NAME}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: gimx-bookworm-arm64-deb
          path: ./*.deb
